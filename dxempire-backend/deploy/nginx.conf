# DXEMPIRE — Nginx site configuration
# Place at: /etc/nginx/sites-available/dxempire
# Enable:   ln -s /etc/nginx/sites-available/dxempire /etc/nginx/sites-enabled/dxempire

# Redirect all HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name api.dxempire.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.dxempire.com;

    root /var/www/dxempire-backend/public;
    index index.php;
    charset utf-8;

    # ── SSL (Let's Encrypt via Certbot) ────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/api.dxempire.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.dxempire.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers (redundant with middleware — belt-and-braces) ─────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header X-Frame-Options           "DENY"                                         always;
    add_header X-XSS-Protection          "1; mode=block"                                always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;

    # ── Logging ────────────────────────────────────────────────────────────
    access_log /var/log/nginx/dxempire-access.log;
    error_log  /var/log/nginx/dxempire-error.log;

    # ── Gzip ───────────────────────────────────────────────────────────────
    gzip            on;
    gzip_types      application/json text/plain application/javascript;
    gzip_min_length 1024;

    # ── Client upload limit ────────────────────────────────────────────────
    client_max_body_size 10M;

    # ── Routes ─────────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    # ── PHP-FPM ────────────────────────────────────────────────────────────
    location ~ \.php$ {
        fastcgi_pass   unix:/var/run/php/php8.0-fpm.sock;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include        fastcgi_params;

        # Pass real client IP when behind a load balancer
        fastcgi_param  HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;

        fastcgi_read_timeout 120;
    }

    # ── Block hidden files ─────────────────────────────────────────────────
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # ── Block access to sensitive files ────────────────────────────────────
    location ~* \.(env|log|htaccess|git)$ {
        deny all;
    }
}
